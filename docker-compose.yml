version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - db_data:/app/data
    environment:
      - ADMIN_TOKEN=CHANGE_ME_ADMIN_SECRET
      - JWT_SECRET=CHANGE_ME_JWT_SECRET
      - DATABASE_URL=sqlite:///data/kahoot.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  db_data:
